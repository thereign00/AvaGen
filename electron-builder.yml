appId: com.avagen.desktop
productName: AvaGen
directories:
  output: dist-electron
asar: true
asarUnpack:
  - "**/*.node"
  - ".next/standalone/**"
npmRebuild: false
files:
  - ".next/standalone/**"
  - "electron/**"
  - "package.json"
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: AvaGen
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: "thereign00"
  repo: "AvaGen"
  releaseType: "release"
