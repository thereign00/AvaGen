appId: com.avagen.desktop
productName: AvaGen
directories:
  output: dist-electron
asar: true
asarUnpack:
  - "**/*.node"
npmRebuild: false
files:
  - ".next/standalone/**"
  - "electron/**"
  - "package.json"
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: AvaGen
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: "YOUR_GITHUB_USERNAME" # Update this to your GitHub username when publishing releases
  repo: "AvaGen"
